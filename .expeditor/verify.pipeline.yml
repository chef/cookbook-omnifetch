---
steps:
- label: "run-specs-ruby-3.3"
  command:
    - .expeditor/run_linux_tests.sh
  expeditor:
    executor:
      docker:
        image: ruby:3.3

- label: ":windows: :ruby: 3.3"
  command:
    - .expeditor/run_windows_tests.ps1
  timeout_in_minutes: 20
  expeditor:
    executor:
      docker:
        host_os: windows
        shell: ["powershell", "-Command"]
        image: rubydistros/windows-2019:3.3
        environment:
          - BUNDLE_GEMFILE=/workdir/Gemfile